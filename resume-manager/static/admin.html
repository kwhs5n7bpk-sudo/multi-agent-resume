<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #222222;
      --text: #fafafa;
      --text-dim: #666666;
      --accent: #00ff88;
      --accent-dim: rgba(0,255,136,0.1);
      --font: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    [x-cloak] { display: none !important; }

    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sidebar-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .sidebar-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .sidebar-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Main */
    .main {
      flex: 1;
      margin-left: 240px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
    }

    .btn-primary:hover {
      background: #00ff99;
    }

    .content {
      padding: 48px;
    }

    .content-inner {
      max-width: 720px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: #444;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* List Items */
    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 12px;
      position: relative;
    }

    .list-item-remove {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      opacity: 0;
      font-size: 12px;
    }

    .list-item:hover .list-item-remove { opacity: 1; }

    .list-item-remove:hover {
      background: #ff453a;
      color: white;
    }

    .list-add {
      width: 100%;
      padding: 16px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .list-add:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .highlight-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }

    .highlight-row .form-input { flex: 1; }

    .highlight-remove {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 10px;
      transition: all 0.2s;
    }

    .highlight-remove:hover {
      background: #ff453a;
      color: white;
    }

    .add-highlight {
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--accent);
      color: #0a0a0a;
      padding: 14px 24px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 100;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .content { padding: 24px; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body x-data="admin()" x-init="init()" x-cloak>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">简历管理</div>
        <div class="sidebar-sub">管理你的简历内容</div>
      </div>
      <nav class="sidebar-nav">
        <template x-for="item in menuItems" :key="item.id">
          <button @click="activeSection = item.id"
            :class="activeSection === item.id ? 'active' : ''"
            class="sidebar-item">
            <span x-text="item.icon"></span>
            <span x-text="item.label"></span>
          </button>
        </template>
      </nav>
      <div class="sidebar-footer">
        <a href="/resume.html" target="_blank" class="sidebar-link">
          预览 ↗
        </a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <h1 class="header-title" x-text="currentMenu?.label"></h1>
        <div class="header-actions">
          <button @click="resetData()" class="btn btn-ghost">重置</button>
          <button @click="saveData()" class="btn btn-primary">保存</button>
        </div>
      </header>

      <div class="content">
        <!-- 基本信息 -->
        <div x-show="activeSection === 'basic'" class="content-inner">
          <div class="form-card">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">姓名</label>
                <input x-model="resume.name" class="form-input" placeholder="姓名">
              </div>
              <div class="form-group">
                <label class="form-label">职位</label>
                <input x-model="resume.title" class="form-input" placeholder="职位">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Slogan</label>
                <input x-model="resume.slogan" class="form-input" placeholder="Slogan">
              </div>
              <div class="form-group">
                <label class="form-label">副标题</label>
                <input x-model="resume.subtitle" class="form-input" placeholder="副标题">
              </div>
            </div>
            <div class="form-row-3">
              <div class="form-group">
                <label class="form-label">城市</label>
                <input x-model="resume.location" class="form-input" placeholder="北京">
              </div>
              <div class="form-group">
                <label class="form-label">状态</label>
                <input x-model="resume.status" class="form-input" placeholder="OPEN TO WORK">
              </div>
              <div class="form-group">
                <label class="form-label">标签（逗号分隔）</label>
                <input x-model="resume.tagsStr" @blur="resume.tags = resume.tagsStr.split(',').map(s=>s.trim())" class="form-input" placeholder="AI, LLM, Agent">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">电话</label>
                <input x-model="resume.contact.phone" class="form-input" placeholder="电话">
              </div>
              <div class="form-group">
                <label class="form-label">邮箱</label>
                <input x-model="resume.contact.email" class="form-input" placeholder="邮箱">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">个人简介</label>
              <textarea x-model="resume.summary" class="form-input" rows="4" placeholder="简介..."></textarea>
            </div>
          </div>
        </div>

        <!-- 核心数据 -->
        <div x-show="activeSection === 'stats'" class="content-inner">
          <template x-for="(stat, index) in resume.stats" :key="index">
            <div class="list-item">
              <button @click="resume.stats.splice(index, 1)" class="list-item-remove">✕</button>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">数值</label>
                  <input x-model="stat.value" class="form-input" placeholder="0→1">
                </div>
                <div class="form-group">
                  <label class="form-label">说明</label>
                  <input x-model="stat.label" class="form-input" placeholder="说明">
                </div>
              </div>
            </div>
          </template>
          <button @click="resume.stats.push({value:'', label:''})" class="list-add">+ 添加</button>
        </div>

        <!-- 核心优势 -->
        <div x-show="activeSection === 'advantages'" class="content-inner">
          <template x-for="(adv, index) in resume.advantages" :key="index">
            <div class="list-item">
              <button @click="resume.advantages.splice(index, 1)" class="list-item-remove">✕</button>
              <div class="form-group">
                <label class="form-label">标题</label>
                <input x-model="adv.title" class="form-input" placeholder="标题">
              </div>
              <div class="form-group">
                <label class="form-label">描述</label>
                <textarea x-model="adv.description" class="form-input" rows="3" placeholder="描述..."></textarea>
              </div>
            </div>
          </template>
          <button @click="resume.advantages.push({title:'', description:''})" class="list-add">+ 添加</button>
        </div>

        <!-- 工作经历 -->
        <div x-show="activeSection === 'experience'" class="content-inner">
          <template x-for="(exp, index) in resume.experience" :key="index">
            <div class="list-item">
              <button @click="resume.experience.splice(index, 1)" class="list-item-remove">✕</button>
              <div class="form-row-3">
                <div class="form-group">
                  <label class="form-label">公司</label>
                  <input x-model="exp.company" class="form-input" placeholder="公司">
                </div>
                <div class="form-group">
                  <label class="form-label">职位</label>
                  <input x-model="exp.role" class="form-input" placeholder="职位">
                </div>
                <div class="form-group">
                  <label class="form-label">时间段</label>
                  <input x-model="exp.period" class="form-input" placeholder="2025.03 – 至今">
                </div>
              </div>
              <template x-for="(section, sIndex) in exp.sections" :key="sIndex">
                <div style="margin-top:16px; padding:16px; background:var(--surface-2); border:1px solid var(--border);">
                  <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <input x-model="section.title" class="form-input" placeholder="阶段标题" style="flex:1;">
                    <button @click="exp.sections.splice(sIndex, 1)" class="highlight-remove">✕</button>
                  </div>
                  <template x-for="(highlight, hIndex) in section.highlights" :key="hIndex">
                    <div class="highlight-row">
                      <input x-model="section.highlights[hIndex]" class="form-input" placeholder="内容">
                      <button @click="section.highlights.splice(hIndex, 1)" class="highlight-remove">✕</button>
                    </div>
                  </template>
                  <button @click="section.highlights.push('')" class="add-highlight">+ 内容</button>
                </div>
              </template>
              <button @click="exp.sections.push({title:'', highlights:[]})" class="add-highlight" style="margin-top:12px;">+ 阶段</button>
            </div>
          </template>
          <button @click="resume.experience.push({company:'', role:'', period:'', location:'', sections:[]})" class="list-add">+ 添加</button>
        </div>

        <!-- 时间轴 -->
        <div x-show="activeSection === 'timeline'" class="content-inner">
          <template x-for="(item, index) in resume.timeline" :key="index">
            <div class="list-item">
              <button @click="resume.timeline.splice(index, 1)" class="list-item-remove">✕</button>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">日期</label>
                  <input x-model="item.date" class="form-input" placeholder="2025.09">
                </div>
                <div class="form-group">
                  <label class="form-label">事件</label>
                  <input x-model="item.event" class="form-input" placeholder="事件">
                </div>
              </div>
            </div>
          </template>
          <button @click="resume.timeline.push({date:'', event:''})" class="list-add">+ 添加</button>
        </div>

        <!-- 证书 -->
        <div x-show="activeSection === 'certificates'" class="content-inner">
          <template x-for="(cert, index) in resume.certificates" :key="index">
            <div class="highlight-row" style="margin-bottom:12px;">
              <input x-model="resume.certificates[index]" class="form-input" placeholder="证书">
              <button @click="resume.certificates.splice(index, 1)" class="highlight-remove">✕</button>
            </div>
          </template>
          <button @click="resume.certificates.push('')" class="list-add">+ 添加</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div x-show="showToast" x-cloak
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-4"
    class="toast" x-text="toastMessage">
  </div>

  <script>
    function admin() {
      return {
        resume: {},
        originalResume: null,
        activeSection: 'basic',
        showToast: false,
        toastMessage: '',
        menuItems: [
          { id: 'basic', label: '基本信息', icon: '👤' },
          { id: 'stats', label: '核心数据', icon: '📊' },
          { id: 'advantages', label: '核心能力', icon: '⚡' },
          { id: 'experience', label: '工作经历', icon: '💼' },
          { id: 'timeline', label: '时间轴', icon: '📅' },
          { id: 'certificates', label: '证书', icon: '🏆' },
        ],
        get currentMenu() {
          return this.menuItems.find(m => m.id === this.activeSection);
        },
        async init() {
          const res = await fetch('/api/resume');
          this.resume = await res.json();
          this.resume.tagsStr = (this.resume.tags || []).join(', ');
          this.originalResume = JSON.parse(JSON.stringify(this.resume));
        },
        async saveData() {
          await fetch('/api/resume', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(this.resume)
          });
          this.originalResume = JSON.parse(JSON.stringify(this.resume));
          this.toast('已保存');
        },
        resetData() {
          this.resume = JSON.parse(JSON.stringify(this.originalResume));
          this.toast('已重置');
        },
        toast(msg) {
          this.toastMessage = msg;
          this.showToast = true;
          setTimeout(() => this.showToast = false, 2000);
        }
      }
    }
  </script>
</body>
</html>
